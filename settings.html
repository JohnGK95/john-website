<!doctype html>

<html lang="en">
  <head>
    <title>Settings</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <main class="page">
      <div class="page-header">
        <h1>Settings</h1>
      </div>

      <div class="notes-box settings-panel">
        <h2>Backup & Restore</h2>

        <p>
          Export your saved events, goals, vocabulary, notes, and preferences
          into a backup file. You can import that file later to restore your
          data.
        </p>

        <div class="settings-actions">
          <button id="export-backup" type="button">Export Backup</button>

          <label class="import-label">
            Import Backup
            <input id="import-backup" type="file" accept=".json" />
          </label>
        </div>

        <p id="backup-status" class="settings-status"></p>
      </div>
    </main>

    <script src="js/navbar.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
