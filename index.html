<!doctype html>

<html lang="en">
  <head>
    <title>Welcome</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <main class="page dashboard-page">
      <div class="page-header">
        <h1>Dashboard</h1>
      </div>

      <div class="dashboard-grid">
        <a class="dashboard-card dashboard-events" href="#calendar">Events</a>
        <a
          class="dashboard-card dashboard-goals"
          href="projects/2026-goals.html"
          >2026 Goals</a
        >
        <a
          class="dashboard-card dashboard-languages"
          href="languages/index.html"
          >Languages</a
        >
        <a class="dashboard-card dashboard-projects" href="projects/index.html"
          >Projects</a
        >
      </div>
      <section class="dashboard-overview">
        <div class="overview-card">
          <h2>Next Event</h2>
          <div id="next-event-widget"></div>
        </div>

        <div class="overview-card">
          <h2>Goal Progress</h2>
          <div id="goal-summary-widget"></div>
        </div>

        <div class="overview-card">
          <h2>Daily Words</h2>
          <div id="daily-words-widget"></div>
        </div>

        <div class="overview-card">
          <h2>Recent Notes</h2>
          <div id="recent-notes-widget"></div>
        </div>
      </section>
      <section id="calendar" class="dashboard-section">
        <h2>Events</h2>

        <div class="events-dashboard">
          <div class="event-create-card">
            <h3>Add Event</h3>

            <form id="event-form">
              <input id="event-start-date" type="date" required />

              <input id="event-end-date" type="date" />

              <input
                id="event-title"
                type="text"
                placeholder="Event name..."
                required
              />

              <textarea id="event-notes" placeholder="Notes..."></textarea>

              <button type="submit">Add Event</button>
            </form>
          </div>

          <div class="mini-calendar">
            <div class="calendar-header">
              <h3 id="calendar-month"></h3>

              <div class="calendar-nav">
                <button id="prev-month" type="button">‹</button>
                <button id="next-month" type="button">›</button>
              </div>
            </div>

            <div id="calendar-grid"></div>
          </div>
        </div>

        <h3 class="upcoming-title">Upcoming Events</h3>

        <ul id="event-list"></ul>
      </section>
    </main>

    <script src="js/navbar.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/events.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
