<!doctype html>

<html lang="en">
  <head>
    <title>German</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="language-page german-theme">
    <div id="navbar"></div>

    <main class="page">
      <h1>German</h1>

      <div class="notes-box">
        <h2>Vocabulary</h2>

        <p id="vocab-count">0 words saved</p>

        <div id="daily-word-preview"></div>

        <a class="card vocab-link-card" href="german-vocab.html">
          Open Vocabulary List
        </a>
      </div>

      <div class="notes-box">
        <h2>Notes</h2>

        <div class="note-filter">
          <label for="note-tag-filter">Filter by tag:</label>

          <select id="note-tag-filter">
            <option value="all">All Tags</option>
          </select>
        </div>

        <form id="note-form" class="note-form">
          <input
            id="note-title"
            type="text"
            placeholder="Note title..."
            required
          />

          <textarea
            id="note-content"
            placeholder="Write your note..."
            required
          ></textarea>

          <input
            id="note-tag"
            type="text"
            placeholder="Tag, e.g. grammar, vocab, B2..."
          />

          <button type="submit">Save Note</button>
        </form>

        <div id="note-list"></div>
      </div>
    </main>

    <script src="../js/navbar.js"></script>

    <script>
      const vocabLanguage = "german";
    </script>

    <script src="../js/language-overview.js"></script>
    <script src="../js/language-notes.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
